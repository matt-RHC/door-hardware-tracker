[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    bug12: tests blocked on BUG-12 MCA field concatenation fix
    cross_pdf: cross-PDF structural consistency tests
    llm_review: tests that call Anthropic API for LLM review (need --run-ai-review)
addopts = -v --tb=short
