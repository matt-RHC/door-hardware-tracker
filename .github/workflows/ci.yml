name: CI

on:
  push:
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'next.config.ts'
      - 'vercel.json'
      - 'vitest.config.ts'
  pull_request:
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'next.config.ts'
      - 'vercel.json'
      - 'vitest.config.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run extraction tests
        run: pytest tests/ -v --tb=short

      - name: Report accuracy summary
        if: always()
        run: pytest tests/test_extraction.py -v -s --tb=long 2>&1 | tail -50 || true

  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run TypeScript unit tests
        run: npm run test
