name: PDF Extraction Tests

on:
  push:
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run extraction tests
        run: pytest tests/ -v --tb=short

      - name: Report accuracy summary
        if: always()
        run: pytest tests/test_extraction.py -v -s --tb=long 2>&1 | tail -50 || true
